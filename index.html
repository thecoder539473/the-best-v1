<head>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxy Search</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
    }

    .container {
        margin-top: 60px;
        text-align: center;
        backdrop-filter: blur(10px);
        background: rgba(255,255,255,0.1);
        padding: 20px 30px;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
        margin-bottom: 15px;
    }

    input {
        width: 300px;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #00c6ff;
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin-left: 5px;
        transition: 0.3s;
    }

    button:hover {
        background: #0072ff;
    }

    iframe {
        margin-top: 20px;
        width: 90%;
        height: 60vh;
        border: none;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

<div class="container">
    <h1>🌐 Proxy Search</h1>
    <input type="text" id="search" placeholder="Enter URL or search...">
    <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
    let input = document.getElementById("search").value.trim();

    if (!input) return;

    // If it's not a URL, turn it into a Google search
    if (!input.startsWith("http")) {
        input = "https://www.google.com/search?q=" + encodeURIComponent(input);
    }

    // Basic proxy wrapper (replace with your own backend if needed)
    const proxy = "https://api.allorigins.win/raw?url=";

    document.getElementById("frame").src = proxy + encodeURIComponent(input);
}
</script>

</body>
</html>
