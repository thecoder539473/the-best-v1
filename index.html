<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Best OS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#1e293b,#0f172a);
    color: white;
    overflow: hidden;
}

/* DESKTOP */
#desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* ICONS */
.icon {
    width: 80px;
    text-align: center;
    margin: 20px;
    cursor: pointer;
}

/* WINDOWS */
.window {
    position: absolute;
    width: 500px;
    height: 350px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.titlebar {
    background: #222;
    padding: 5px;
    cursor: move;
    display:flex;
    justify-content:space-between;
}

.content {
    padding: 10px;
    height: calc(100% - 30px);
    overflow:auto;
}

/* TASKBAR */
#taskbar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 0 10px;
}

/* CLOCK */
#clock {
    font-size: 14px;
}
</style>
</head>

<body>

<div id="desktop">

    <!-- ICONS -->
    <div class="icon" onclick="openApp('browser')">🌐<br>Browser</div>
    <div class="icon" onclick="openApp('notes')">📝<br>Notes</div>
    <div class="icon" onclick="openApp('slides')">📊<br>Slides</div>

</div>

<!-- TASKBAR -->
<div id="taskbar">
    <div>The Best OS</div>
    <div id="clock"></div>
</div>

<script>
let z = 1;

// CREATE WINDOW
function openApp(app) {
    let win = document.createElement("div");
    win.className = "window";
    win.style.top = "100px";
    win.style.left = "100px";
    win.style.zIndex = z++;

    win.innerHTML = `
        <div class="titlebar">
            <span>${app}</span>
            <button onclick="this.closest('.window').remove()">X</button>
        </div>
        <div class="content">${getAppContent(app)}</div>
    `;

    document.getElementById("desktop").appendChild(win);
    drag(win);
}

// APP CONTENT
function getAppContent(app) {

    if(app==="browser"){
        return `
        <input id="searchBox" placeholder="Search..."
        onkeydown="if(event.key==='Enter'){goSearch(this.value)}">
        <iframe id="frame" style="width:100%;height:80%;border:none;"></iframe>
        `;
    }

    if(app==="notes"){
        return `
        <textarea id="notes" style="width:100%;height:90%;"></textarea>
        `;
    }

    if(app==="slides"){
        return `
        <h3>Presentation</h3>
        <p>• Idea 1</p>
        <p>• Idea 2</p>
        `;
    }
}

// SEARCH
function goSearch(q){
    document.getElementById("frame").src =
    "https://bing.com/search?q="+encodeURIComponent(q);
}

// DRAGGING
function drag(el) {
    let bar = el.querySelector(".titlebar");
    let offsetX, offsetY;

    bar.onmousedown = (e) => {
        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;

        document.onmousemove = (e) => {
            el.style.left = e.clientX - offsetX + "px";
            el.style.top = e.clientY - offsetY + "px";
        };

        document.onmouseup = () => {
            document.onmousemove = null;
        };
    };
}

// CLOCK
setInterval(()=>{
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

// SAVE NOTES
document.addEventListener("input", e=>{
    if(e.target.id==="notes"){
        localStorage.setItem("notes", e.target.value);
    }
});

document.addEventListener("focusin", e=>{
    if(e.target.id==="notes"){
        e.target.value = localStorage.getItem("notes") || "";
    }
});
</script>

</body>
</html>
