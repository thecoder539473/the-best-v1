<README></README>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Best WebOS - ULTRA</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
.window { position:absolute; }
.icon { cursor:pointer; user-select:none; }
</style>
</head>
<body class="bg-black text-white">

<!-- LOGIN SCREEN -->
<div id="login" class="w-screen h-screen flex items-center justify-center bg-black">
  <div class="text-center">
    <h1 class="text-2xl mb-4">The Best OS 🔐</h1>
    <input id="user" placeholder="Username" class="bg-gray-800 p-2 mb-2"><br>
    <input id="pass" type="password" placeholder="Password" class="bg-gray-800 p-2 mb-2"><br>
    <button onclick="login()" class="bg-blue-600 px-4 py-2 rounded">Login</button>
    <div id="loginMsg" class="text-red-500 mt-2"></div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop" class="hidden w-screen h-screen bg-gradient-to-br from-gray-900 to-black relative">

<div class="p-4 space-y-4">
<div class="icon" onclick="openApp('terminal')">🖥️ Terminal</div>
<div class="icon" onclick="openApp('files')">📁 Files</div>
<div class="icon" onclick="openApp('browser')">🌐 Browser</div>
<div class="icon" onclick="openApp('store')">🛒 Store</div>
<div class="icon" onclick="changeBG()">🎨 Theme</div>
</div>

<div class="absolute bottom-0 w-full h-12 bg-gray-800 flex items-center px-4 gap-3">
<span id="userLabel"></span>
<div id="taskbarApps" class="flex gap-2"></div>
<div class="ml-auto" id="clock"></div>
</div>

</div>

<div id="windows"></div>

<script>
// -------- LOGIN SYSTEM --------
let attempts = 0;

function login(){
let name=document.getElementById('user').value;
let pass=document.getElementById('pass').value;
let msg=document.getElementById('loginMsg');

const USERNAME="admin";
const PASSWORD="1234";

if(attempts >= 3){
  msg.innerText = "SYSTEM LOCKED";
  return;
}

if(name!==USERNAME || pass!==PASSWORD){
  attempts++;
  msg.innerText = `ACCESS DENIED (${attempts}/3)`;
  msg.classList.add('animate-pulse');
  document.body.classList.add('bg-red-900');
  setTimeout(()=>document.body.classList.remove('bg-red-900'),300);
  return;
}

msg.innerText = "ACCESS GRANTED";
msg.classList.remove('text-red-500');
msg.classList.add('text-green-400');

setTimeout(()=>{
  let styledName = `🔥 ${name.toUpperCase()} 🔥`;
  localStorage.setItem('user',name);

  document.getElementById('login').style.display='none';
  document.getElementById('desktop').classList.remove('hidden');

  let label = document.getElementById('userLabel');
  label.innerText = styledName;
  label.classList.add('font-bold','text-yellow-400','tracking-widest');
},800);
}

window.onload = () => { attempts = 0; };

// -------- STATE --------
let zIndex=1;
let fileSystem=JSON.parse(localStorage.getItem('fs')||'{}');
let bgIndex=0;
const bgs=["from-gray-900 to-black","from-blue-900 to-black","from-purple-900 to-black"];

function saveFS(){localStorage.setItem('fs',JSON.stringify(fileSystem));}

// -------- CLOCK --------
setInterval(()=>{
document.getElementById('clock').innerText=new Date().toLocaleTimeString();
},1000);

// -------- WINDOWS --------
function createWindow(title,content){
const win=document.createElement('div');
win.className='window top-20 left-20 w-[720px] bg-gray-900 border border-gray-700 rounded-2xl shadow-lg';
win.style.zIndex=zIndex++;

win.innerHTML=`
<div class="flex justify-between bg-gray-800 px-3 py-2 cursor-move">
<span>${title}</span>
<div>
<button onclick="minWin(this)">—</button>
<button onclick="closeWin(this)">✖</button>
</div>
</div>
<div class="p-3">${content}</div>`;

win.onmousedown=()=>win.style.zIndex=zIndex++;
makeDraggable(win);

document.getElementById('windows').appendChild(win);
addTaskbar(title,win);
}

function closeWin(btn){btn.closest('.window').remove();}
function minWin(btn){btn.closest('.window').style.display='none';}

function addTaskbar(title,win){
let btn=document.createElement('button');
btn.innerText=title;
btn.onclick=()=>win.style.display='block';
document.getElementById('taskbarApps').appendChild(btn);
}

// -------- APPS --------
let apps={
calculator:()=>createWindow('Calculator',`<input oninput="this.value=eval(this.value||0)" class='w-full bg-black'>`)
};

function openApp(app){
if(app==='terminal'){
createWindow('Terminal',`<div id='term'></div><input id='cmd' class='w-full bg-black'>`);
setTimeout(()=>{
document.getElementById('cmd').onkeydown=e=>{if(e.key==='Enter') runCmd(e.target)};
},100);
}

if(app==='browser'){
createWindow('Browser',`<input class='url bg-black w-full'><button onclick='newTab(this)'>Go</button><iframe class='w-full h-80 bg-white'></iframe>`);
}

if(app==='files'){
let list=Object.keys(fileSystem).map(f=>`<div onclick="openFile('${f}')">📄 ${f}</div>`).join('');
createWindow('Files',`${list}<input id='nf'><button onclick='createFile(this)'>New</button>`);
}

if(app==='store'){
let list=Object.keys(apps).map(a=>`<div>${a} <button onclick="installApp('${a}')">Install</button></div>`).join('');
createWindow('Store',list);
}

if(apps[app]) apps[app]();
}

function installApp(name){ alert(name+' installed'); }

// -------- TERMINAL --------
function runCmd(input){
let cmd=input.value;
let out=document.getElementById('term');

if(cmd==='help') out.innerHTML+='help ls clear open';
else if(cmd==='ls') out.innerHTML+=Object.keys(fileSystem).join('<br>');
else if(cmd.startsWith('open ')) openApp(cmd.split(' ')[1]);
else if(cmd==='clear') out.innerHTML='';
else out.innerHTML+='unknown';

out.innerHTML+='<br>';
input.value='';
}

// -------- FILES --------
function createFile(btn){
let name=btn.previousElementSibling.value;
fileSystem[name]=''; saveFS();
}

function openFile(name){
createWindow(name,`<textarea oninput="saveFile('${name}',this.value)" class='w-full h-60 bg-black'>${fileSystem[name]}</textarea>`);
}

function saveFile(name,val){ fileSystem[name]=val; saveFS(); }

// -------- BROWSER --------
function newTab(btn){
let box=btn.closest('.window');
let url=box.querySelector('.url').value;
let frame=box.querySelector('iframe');
if(!url.startsWith('http')) url='https://'+url;
frame.src=url;
}

// -------- THEMES --------
function changeBG(){
bgIndex=(bgIndex+1)%bgs.length;
document.getElementById('desktop').className=`w-screen h-screen bg-gradient-to-br ${bgs[bgIndex]} relative`;
}

// -------- DRAG --------
function makeDraggable(el){
let down=false,ox=0,oy=0;
let head=el.firstElementChild;
head.onmousedown=e=>{down=true;ox=el.offsetLeft-e.clientX;oy=el.offsetTop-e.clientY;};
document.onmouseup=()=>down=false;
document.onmousemove=e=>{if(down){el.style.left=e.clientX+ox+'px';el.style.top=e.clientY+oy+'px';}};
}

// -------- AUTO LOGIN --------
if(localStorage.getItem('user')){
document.getElementById('login').style.display='none';
document.getElementById('desktop').classList.remove('hidden');
}
</script>

</body>
</html>
